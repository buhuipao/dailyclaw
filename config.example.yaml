telegram:
  token: "${TELEGRAM_BOT_TOKEN}"
  allowed_user_ids:
    - 123456789

llm:
  text:
    base_url: "https://api.openai.com/v1"
    api_key: "${LLM_API_KEY}"
    model: "gpt-4o-mini"
  vision:
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    api_key: "${VISION_API_KEY}"
    model: "doubao-seed-1241-v2.0-250304"

# Log level: DEBUG (default) | INFO | WARNING | ERROR
# Local dev: omit or set DEBUG; production: set INFO
log_level: "DEBUG"

timezone: "Asia/Shanghai"

plugins:
  recorder:
    dedup_window: 10
  journal:
    evening_prompt_time: "21:30"
    template: "zeng_guofan"
  planner: {}                    # plans are created per-user via /planner_add
