telegram:
  token: "${TELEGRAM_BOT_TOKEN}"
  allowed_user_ids:
    - 123456789

llm:
  text:
    base_url: "https://api.openai.com/v1"
    api_key: "${LLM_API_KEY}"
    model: "gpt-4o-mini"
  vision:
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    api_key: "${VISION_API_KEY}"
    model: "doubao-seed-1241-v2.0-250304"

# Log level: DEBUG (default) | INFO | WARNING | ERROR
# Local dev: omit or set DEBUG; production: set INFO
log_level: "DEBUG"

timezone: "Asia/Shanghai"

# Rate limits for non-invited (trial) users. Invited users have no limits.
trial:
  rate_per_minute: 10               # max messages per minute
  daily_quota: 50                  # max messages per day

plugins:
  memo:
    dedup_window: 10

  wiki:
    seed_topics:
      - { topic: "health", title: "Health & Fitness" }
      - { topic: "career", title: "Career & Growth" }
      - { topic: "reading", title: "Reading Notes" }
      - { topic: "ideas", title: "Ideas & Inspiration" }
    ingest_hour: 22
    ingest_minute: 30
    digest_day: "sunday"
    digest_hour: 21
    nudge_enabled: true
    nudge_threshold: 0.85
    nudge_max_per_day: 3
    lint_day: 1                    # day of month

  reflect:
    remind_hour: 21
    remind_minute: 0
    auto_journal_hour: 22
    auto_journal_minute: 30
    template: "zeng_guofan"

  track: {}                      # goals created per-user via /goal
